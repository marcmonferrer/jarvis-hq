name: Update market data

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update_market_data.py"
      - ".github/workflows/update-market-data.yml"
  schedule:
    # Four updates on weekdays. Times are UTC.
    - cron: "17 7,11,15,19 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh market feed
        run: python scripts/update_market_data.py

      - name: Commit updated feed
        run: |
          git config user.name "jarvis-hq-bot"
          git config user.email "actions@users.noreply.github.com"
          git add market-data.json
          if git diff --cached --quiet; then
            echo "No market data changes to commit."
          else
            git commit -m "chore: refresh market data"
            git push
          fi
